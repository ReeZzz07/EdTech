services:
  postgres:
    image: postgres:16-alpine
    container_name: egepro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: egepro
      POSTGRES_PASSWORD: egepro
      POSTGRES_DB: egepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egepro -d egepro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: egepro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
